<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — Thần Nông Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #8b5e3c 0%, #a98467 60%, #5c3d25 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 20px 60px rgba(0,0,0,.25); width: 100%; max-width: 420px; }
        .login-logo { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #8b5e3c; }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="login-card mx-auto">
        <div class="text-center mb-4">
            <img src="assets/images/logo_shop.png" alt="Logo Thần Nông" class="login-logo mb-3" onerror="this.style.display='none'">
            <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#8b5e3c;margin-bottom:.25rem;">Thần Nông</h1>
            <p class="text-muted small">Đăng nhập để tiếp tục mua sắm</p>
        </div>
        <div id="alertBox" class="alert d-none" role="alert"></div>
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <div class="mb-3">
                <label class="form-label fw-bold small">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user" style="color:#8b5e3c;"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required autocomplete="username">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock" style="color:#8b5e3c;"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn w-100 py-2 fw-bold" style="background:#8b5e3c;color:white;border-radius:10px;">
                <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
            </button>
        </form>
        <hr class="my-3">
        <p class="text-center small text-muted mb-2">Chưa có tài khoản? <a href="register.html" style="color:#8b5e3c;">Đăng ký ngay</a></p>
        <p class="text-center small text-muted mb-0"><a href="index.html" style="color:#6c757d;"><i class="fas fa-arrow-left me-1"></i>Về trang chủ</a></p>
        <div class="mt-3 p-2 rounded small text-center" style="background:#fbf8f5;color:#8b5e3c;">
            <strong>Demo:</strong> admin / admin123
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
    // Nếu đã đăng nhập thì chuyển hướng
    if (isLoggedIn()) {
        window.location.href = isAdmin() ? 'admin/dashboard.html' : 'index.html';
    }

    async function handleLogin(event) {
        event.preventDefault();
        const btn = document.getElementById('submitBtn');
        const alertBox = document.getElementById('alertBox');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        if (!username || !password) { showError('Vui lòng nhập đầy đủ thông tin!'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';
        alertBox.className = 'alert d-none';

        try {
            const res = await apiRequest('/auth/login', 'POST', { username, password }, false);
            // Lưu token và thông tin user
            localStorage.setItem('thanNong_token', res.token);
            localStorage.setItem('thanNong_user', JSON.stringify({ username: res.username, roles: res.roles }));
            // Redirect theo role
            window.location.href = res.roles && res.roles.includes('ROLE_ADMIN') ? 'admin/dashboard.html' : 'index.html';
        } catch (err) {
            showError('Sai tên đăng nhập hoặc mật khẩu!');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Đăng nhập';
        }
    }

    function showError(msg) {
        const box = document.getElementById('alertBox');
        box.className = 'alert alert-danger';
        box.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i>${msg}`;
    }

    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else { pwd.type = 'password'; icon.className = 'fas fa-eye'; }
    }
</script>
</body>
</html>
