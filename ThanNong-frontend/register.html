<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký — Thần Nông Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#8b5e3c,#a98467 60%,#5c3d25); min-height:100vh; display:flex; align-items:center; justify-content:center; padding: 2rem 0; }
        .card-form { background:white; border-radius:20px; padding:2rem; box-shadow:0 20px 60px rgba(0,0,0,.25); width:100%; max-width:460px; }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="card-form mx-auto">
        <div class="text-center mb-3">
            <img src="assets/images/logo_shop.png" alt="Logo" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid #8b5e3c;" onerror="this.style.display='none'">
            <h1 style="font-family:'Playfair Display',serif;font-size:1.6rem;color:#8b5e3c;margin-top:.5rem;">Tạo Tài Khoản</h1>
            <p class="text-muted small mb-0">Đăng ký để trải nghiệm mua sắm tốt hơn</p>
        </div>
        <div id="alertBox" class="alert d-none"></div>
        <form id="registerForm" onsubmit="handleRegister(event)" novalidate>
            <div class="row g-2">
                <div class="col-6">
                    <label class="form-label small fw-bold">Họ</label>
                    <input type="text" id="lastName" class="form-control form-control-sm" placeholder="Nguyễn" required>
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold">Tên</label>
                    <input type="text" id="firstName" class="form-control form-control-sm" placeholder="Văn A" required>
                </div>
            </div>
            <div class="mb-2 mt-2">
                <label class="form-label small fw-bold">Tên đăng nhập</label>
                <input type="text" id="username" class="form-control form-control-sm" placeholder="username" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Số điện thoại</label>
                <input type="tel" id="phone" class="form-control form-control-sm" placeholder="0901234567" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <input type="password" id="password" class="form-control form-control-sm" placeholder="Tối thiểu 6 ký tự" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" class="form-control form-control-sm" placeholder="Nhập lại mật khẩu" required>
            </div>
            <button type="submit" id="submitBtn" class="btn w-100 py-2 fw-bold" style="background:#8b5e3c;color:white;border-radius:10px;">
                <i class="fas fa-user-plus me-2"></i>Đăng ký
            </button>
        </form>
        <p class="text-center small text-muted mt-3 mb-0">
            Đã có tài khoản? <a href="login.html" style="color:#8b5e3c;">Đăng nhập</a> |
            <a href="index.html" style="color:#6c757d;">Về trang chủ</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
    async function handleRegister(event) {
        event.preventDefault();
        const btn = document.getElementById('submitBtn');
        const lastName    = document.getElementById('lastName').value.trim();
        const firstName   = document.getElementById('firstName').value.trim();
        const username    = document.getElementById('username').value.trim();
        const phone       = document.getElementById('phone').value.trim();
        const password    = document.getElementById('password').value;
        const confirm     = document.getElementById('confirmPassword').value;
        if (!lastName||!firstName||!username||!phone||!password) { showMsg('danger','Vui lòng nhập đầy đủ thông tin!'); return; }
        if (password !== confirm) { showMsg('danger','Mật khẩu xác nhận không khớp!'); return; }
        if (password.length < 6) { showMsg('danger','Mật khẩu tối thiểu 6 ký tự!'); return; }
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang xử lý...';
        try {
            await apiRequest('/auth/register', 'POST', { username, password, firstName, lastName, phoneNumber: phone }, false);
            showMsg('success','Đăng ký thành công! Đang chuyển đến trang đăng nhập...');
            setTimeout(() => window.location.href = 'login.html', 1800);
        } catch (err) {
            showMsg('danger', err.message || 'Đăng ký thất bại, vui lòng thử lại!');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Đăng ký';
        }
    }
    function showMsg(type, msg) {
        const box = document.getElementById('alertBox');
        box.className = `alert alert-${type}`;
        box.innerHTML = msg;
    }
</script>
</body>
</html>
