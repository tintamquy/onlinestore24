<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Hàng Thành Công — Thần Nông</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg,#f0f4ff 0%,#ebf0ff 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .success-card { background:white; border-radius:24px; padding:3rem 2rem; text-align:center; max-width:480px; width:100%; box-shadow:0 20px 60px rgba(45,122,79,.15); }
        .check-circle { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#3b71ca,#5488de); display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="success-card mx-auto">
        <div class="check-circle">
            <i class="fas fa-check fa-2x text-white"></i>
        </div>
        <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#285192;margin-bottom:.5rem;">
            Đặt Hàng Thành Công!
        </h1>
        <p class="text-muted mb-1">Cảm ơn bạn đã tin tưởng Shop Thần Nông</p>
        <p class="text-muted small mb-3">Chúng tôi sẽ liên hệ xác nhận trong vòng 30 phút.</p>

        <div class="p-3 rounded-3 mb-4" style="background:#ebf0ff;border:1px solid #d1d9f0;">
            <div class="text-muted small">Mã đơn hàng của bạn</div>
            <div id="orderIdDisplay" class="fw-bold" style="color:#3b71ca;font-size:1.4rem;">#---</div>
        </div>

        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
            <a href="my-orders.html" class="btn py-2 px-4" style="background:#3b71ca;color:white;border-radius:10px;">
                <i class="fas fa-list me-1"></i>Xem đơn hàng
            </a>
            <a href="products.html" class="btn btn-outline-secondary py-2 px-4" style="border-radius:10px;">
                <i class="fas fa-shopping-bag me-1"></i>Tiếp tục mua sắm
            </a>
        </div>

        <a href="index.html" class="d-block mt-3 small text-muted">
            <i class="fas fa-home me-1"></i>Về trang chủ
        </a>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    if (orderId) {
        document.getElementById('orderIdDisplay').textContent = '#' + orderId;
    }
</script>
</body>
</html>
