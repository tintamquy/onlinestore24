<!DOCTYPE html>
<html lang="vi">
<head>
<title>Chi Tiết Sản Phẩm — Sàn Thương Mại Điện Tử Thần Nông</title>
    <meta name="description" content="Thông tin chi tiết sản phẩm thảo mộc tự nhiên cao cấp, thành phần lành tính giúp nuôi dưỡng và bảo vệ sức khỏe gia đình bạn.">
    <meta name="keywords" content="thần nông, san thuong mai dien tu than nong, san tmđt, thao duoc thien nhien, dau goi thao duoc, my pham thien nhien, buôn bán nhiều mặt hàng">
    
    <!-- Open Graph / Facebook Social Share Preview -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://onlinestore24.pages.dev/product-detail.html">
    <meta property="og:title" content="Chi Tiết Sản Phẩm — Sàn Thương Mại Điện Tử Thần Nông">
    <meta property="og:description" content="Thông tin chi tiết sản phẩm thảo mộc tự nhiên cao cấp, thành phần lành tính giúp nuôi dưỡng và bảo vệ sức khỏe gia đình bạn.">
    <meta property="og:image" content="https://onlinestore24.pages.dev/assets/images/logo_shop.png">
    
    <!-- Twitter Cards Social Share Preview -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://onlinestore24.pages.dev/product-detail.html">
    <meta name="twitter:title" content="Chi Tiết Sản Phẩm — Sàn Thương Mại Điện Tử Thần Nông">
    <meta name="twitter:description" content="Thông tin chi tiết sản phẩm thảo mộc tự nhiên cao cấp, thành phần lành tính giúp nuôi dưỡng và bảo vệ sức khỏe gia đình bạn.">
    <meta name="twitter:image" content="https://onlinestore24.pages.dev/assets/images/logo_shop.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top" style="background:linear-gradient(135deg,#8b5e3c,#5c3d25)!important;padding:.7rem 0;">
    <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html" style="text-decoration:none;">
            <div style="background:#ffffff;border-radius:50%;padding:4px;border:2px solid rgba(255,255,255,.5);margin-right:10px;flex-shrink:0;">
                <img src="assets/images/logo_shop.png" alt="Thần Nông Logo" style="height:48px;width:48px;object-fit:cover;border-radius:50%;">
            </div>
            <div class="d-flex flex-column">
                <span style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:#ffffff;line-height:1.2;text-shadow:0 2px 4px rgba(0,0,0,.2);">Thần Nông</span>
                <span style="font-family:'Inter',sans-serif;font-size:.75rem;color:#e2e8f0;font-weight:500;letter-spacing:1px;text-transform:uppercase;">Thảo dược thiên nhiên</span>
            </div>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <i class="fas fa-bars text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="index.html" style="color:rgba(255,255,255,.85);">Trang chủ</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html" style="color:rgba(255,255,255,.85);">Sản phẩm</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <a href="cart.html" class="nav-link position-relative text-white me-2">
                    <i class="fas fa-shopping-cart fa-lg"></i>
                    <span id="cartBadge" class="d-none position-absolute top-0 start-100 translate-middle badge rounded-pill" style="background:#f4a021;font-size:.6rem;">0</span>
                </a>
                <a id="navLoginBtn" href="login.html" class="btn btn-sm" style="background:#f4a021;color:white;border:none;border-radius:6px;">Đăng nhập</a>
                <button id="navLogoutBtn" class="btn btn-sm btn-outline-light" style="display:none;" onclick="logoutAndRedirect()">Đăng xuất</button>
            </div>
        </div>
    </div>
</nav>

<div class="container py-4" id="productDetailContainer">
    <div class="text-center py-5">
        <div class="spinner-border" style="color:#8b5e3c;"></div>
        <p class="mt-2 text-muted">Đang tải sản phẩm...</p>
    </div>
</div>

<footer style="background:linear-gradient(135deg,#5c3d25,#162d50);color:rgba(255,255,255,.8);padding:1.5rem 0;margin-top:3rem;">
    <div class="container text-center small">© 2024 Sàn thương mại điện tử Thần Nông</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/cart.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (isLoggedIn()) {
            document.getElementById('navLoginBtn').style.display = 'none';
            document.getElementById('navLogoutBtn').style.display = 'inline-block';
        }
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) { window.location.href = 'products.html'; return; }
        try {
            const product = await apiRequest(`/products/${id}`, 'GET', null, false);
            renderProductDetail(product);
        } catch (err) {
            document.getElementById('productDetailContainer').innerHTML =
                `<div class="alert alert-danger text-center"><i class="fas fa-exclamation-circle me-2"></i>Không tải được sản phẩm: ${err.message}</div>`;
        }
    });

    function renderProductDetail(p) {
        const container = document.getElementById('productDetailContainer');
        container.innerHTML = `
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html" style="color:#8b5e3c;">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a href="products.html" style="color:#8b5e3c;">Sản phẩm</a></li>
                    <li class="breadcrumb-item active">${p.productName}</li>
                </ol>
            </nav>
            <div class="row g-4 g-lg-5">
                <!-- ẢNH SẢN PHẨM -->
                <div class="col-md-5">
                    <div class="bg-white rounded-4 border p-3 text-center" style="min-height:300px;display:flex;align-items:center;justify-content:center;">
                        <img src="${getProductImageUrl(p.imageUrl)}" alt="${p.productName}"
                             class="img-fluid" style="max-height:350px;object-fit:contain;mix-blend-mode:multiply;"
                             onerror="this.src='assets/images/products/placeholder.jpg'">
                    </div>
                </div>
                <!-- THÔNG TIN SẢN PHẨM -->
                <div class="col-md-7">
                    <span style="background:#fbf8f5;color:#8b5e3c;font-size:.75rem;padding:.25rem .7rem;border-radius:20px;font-weight:600;">${p.productLineName || 'Thảo Dược'}</span>
                    <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#5c3d25;margin-top:.75rem;margin-bottom:.5rem;">${p.productName}</h1>
                    <div class="d-flex gap-3 text-muted small mb-3">
                        <span><i class="fas fa-barcode me-1"></i>Mã: ${p.productCode || 'N/A'}</span>
                        <span>|</span>
                        <span><i class="fas fa-box me-1"></i>Còn: <strong style="color:${p.quantityInStock < 10 ? '#dc3545' : '#8b5e3c'};">${p.quantityInStock}</strong></span>
                    </div>
                    <div style="font-size:2rem;font-weight:700;color:#8b5e3c;margin-bottom:1rem;">${formatCurrency(p.buyPrice)}</div>

                    <!-- THÊM VÀO GIỎ -->
                    <div class="d-flex align-items-center gap-3 mt-4 pt-3 border-top flex-wrap">
                        <div class="input-group" style="width:130px;">
                            <button class="btn btn-outline-secondary" onclick="updateQty(-1)">−</button>
                            <input type="number" id="detailQty" class="form-control text-center fw-bold" value="1" min="1" max="${p.quantityInStock}">
                            <button class="btn btn-outline-secondary" onclick="updateQty(1)">+</button>
                        </div>
                        <button class="btn flex-grow-1 py-2 fw-bold" style="background:#8b5e3c;color:white;border-radius:10px;"
                                onclick="addCurrentToCart(${p.id}, '${p.productName.replace(/'/g,"\\'")}', '${p.imageUrl||''}', ${p.buyPrice})">
                            <i class="fas fa-cart-plus me-2"></i>Thêm vào giỏ hàng
                        </button>
                    </div>

                    <!-- ĐẶC ĐIỂM NỔI BẬT -->
                    <div class="mt-4 p-3 rounded-3" style="background:#fbf8f5;">
                        <div class="row g-3 text-center">
                            <div class="col-4">
                                <i class="fas fa-leaf mb-1" style="color:#8b5e3c;font-size:1.3rem;"></i>
                                <div class="small fw-bold">100% Thiên Nhiên</div>
                            </div>
                            <div class="col-4">
                                <i class="fas fa-shield-alt mb-1" style="color:#8b5e3c;font-size:1.3rem;"></i>
                                <div class="small fw-bold">An Toàn Da</div>
                            </div>
                            <div class="col-4">
                                <i class="fas fa-truck mb-1" style="color:#8b5e3c;font-size:1.3rem;"></i>
                                <div class="small fw-bold">Giao Toàn Quốc</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- TABS: MÔ TẢ & ĐÁNH GIÁ -->
            <div class="row mt-5">
                <div class="col-12">
                    <ul class="nav nav-tabs" id="productTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" id="desc-tab" data-bs-toggle="tab" data-bs-target="#desc-tab-pane" type="button" role="tab" style="color:#5c3d25;">Mô tả chi tiết</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="review-tab" data-bs-toggle="tab" data-bs-target="#review-tab-pane" type="button" role="tab" style="color:#5c3d25;">Đánh giá sản phẩm</button>
                        </li>
                    </ul>
                    <div class="tab-content border border-top-0 p-4 bg-white rounded-bottom" id="productTabsContent">
                        
                        <!-- Tab Mô Tả -->
                        <div class="tab-pane fade show active" id="desc-tab-pane" role="tabpanel" tabindex="0">
                            <p class="text-muted" style="line-height:1.8;font-size:1rem;">${p.productDescription ? p.productDescription.replace(/\n/g,'<br>') : 'Sản phẩm thảo dược thiên nhiên thuần Việt, an toàn cho mọi loại da.'}</p>
                        </div>
                        
                        <!-- Tab Đánh Giá -->
                        <div class="tab-pane fade" id="review-tab-pane" role="tabpanel" tabindex="0">
                            <div id="reviewFormContainer" class="mb-4 p-4 rounded-4" style="background:#f8f9fa; display:none;">
                                <h5 class="mb-3">Viết đánh giá của bạn</h5>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Chất lượng sản phẩm (1-5 sao)</label>
                                    <select id="reviewRating" class="form-select w-auto">
                                        <option value="5">5 Sao - Tuyệt vời</option>
                                        <option value="4">4 Sao - Rất tốt</option>
                                        <option value="3">3 Sao - Bình thường</option>
                                        <option value="2">2 Sao - Tạm được</option>
                                        <option value="1">1 Sao - Kém</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Nhận xét của bạn</label>
                                    <textarea id="reviewComment" class="form-control" rows="3" placeholder="Nhập đánh giá của bạn về sản phẩm này..."></textarea>
                                </div>
                                <button class="btn btn-primary" onclick="submitReview(${p.id})">Gửi đánh giá</button>
                            </div>
                            <div id="reviewLoginPrompt" class="mb-4 alert alert-info text-center" style="display:none;">
                                Vui lòng <a href="login.html" class="fw-bold text-decoration-none">Đăng nhập</a> để viết đánh giá cho sản phẩm này.
                            </div>

                            <div id="reviewsList" class="mt-4">
                                <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
            
            checkReviewLoginStatus();
            loadProductReviews(p.id);
    }

    function checkReviewLoginStatus() {
        if (isLoggedIn()) {
            document.getElementById('reviewFormContainer').style.display = 'block';
            document.getElementById('reviewLoginPrompt').style.display = 'none';
        } else {
            document.getElementById('reviewFormContainer').style.display = 'none';
            document.getElementById('reviewLoginPrompt').style.display = 'block';
        }
    }

    async function loadProductReviews(productId) {
        try {
            const reviews = await apiRequest(`/reviews/product/${productId}`, 'GET', null, false);
            const container = document.getElementById('reviewsList');
            
            if (!reviews || reviews.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-4">Chưa có đánh giá nào cho sản phẩm này.</p>';
                return;
            }

            container.innerHTML = reviews.map(r => {
                let stars = '';
                for(let i=0; i<5; i++) {
                    stars += i < r.rating ? '<i class="fas fa-star text-warning"></i>' : '<i class="far fa-star text-warning"></i>';
                }
                return `
                <div class="card border-0 shadow-sm mb-3 rounded-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h6 class="fw-bold mb-0">${r.customerName || 'Khách hàng'}</h6>
                            <small class="text-muted">${formatDate(r.createdAt)}</small>
                        </div>
                        <div class="mb-2">${stars}</div>
                        <p class="mb-0 text-muted">${r.comment}</p>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            document.getElementById('reviewsList').innerHTML = '<p class="text-danger text-center">Không thể tải đánh giá.</p>';
        }
    }

    async function submitReview(productId) {
        const rating = parseInt(document.getElementById('reviewRating').value);
        const comment = document.getElementById('reviewComment').value.trim();
        const user = getCurrentUser();
        
        if (!comment) return Swal.fire('Cảnh báo', 'Vui lòng nhập nhận xét', 'warning');
        if (!user) return Swal.fire('Lỗi', 'Vui lòng đăng nhập lại để đánh giá', 'error');

        try {
            await apiRequest('/reviews', 'POST', {
                productId: productId,
                rating: rating,
                comment: comment
            });
            Swal.fire('Thành công', 'Cảm ơn bạn đã đánh giá sản phẩm!', 'success');
            document.getElementById('reviewComment').value = '';
            loadProductReviews(productId);
        } catch (e) {
            Swal.fire('Lỗi', e.message || 'Không thể gửi đánh giá', 'error');
        }
    }

    function updateQty(delta) {
        const input = document.getElementById('detailQty');
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        if (val > parseInt(input.max)) val = parseInt(input.max);
        input.value = val;
    }

    function addCurrentToCart(id, name, img, price) {
        const qty = parseInt(document.getElementById('detailQty').value) || 1;
        addToCart({ id, productName: name, imageUrl: img, buyPrice: price }, qty);
    }
</script>
</body>
</html>
