<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Doanh Thu — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link text-muted"><i class="fas fa-store me-1"></i>Xem cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</a></li>
        </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="dashboard.html" class="brand-link">
            <img src="../assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle elevation-3" onerror="this.style.display='none'">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="customers.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="report-revenue.html" class="nav-link active"><i class="nav-icon fas fa-chart-line"></i><p>Báo cáo doanh thu</p></a></li>
                    <li class="nav-item"><a href="report-customer.html" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>Khách hàng VIP</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Báo Cáo Doanh Thu Theo Tháng</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <div class="input-group">
                                    <div class="input-group-prepend"><span class="input-group-text bg-white"><i class="fas fa-calendar"></i></span></div>
                                    <input type="number" id="yearFilter" class="form-control" placeholder="Năm (VD: 2024)">
                                    <div class="input-group-append">
                                        <button class="btn btn-primary" onclick="loadRevenue()">Xem Báo Cáo</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <canvas id="revenueChart" style="min-height: 300px; max-height: 400px; width: 100%;"></canvas>
                        <hr>
                        <div class="table-responsive mt-4">
                            <table class="table table-bordered table-striped text-center">
                                <thead class="table-light"><tr><th>Tháng</th><th>Số Đơn Hàng</th><th>Tổng Doanh Thu</th></tr></thead>
                                <tbody id="revenueBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    let currentChart = null;

    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        document.getElementById('yearFilter').value = new Date().getFullYear();
        loadRevenue();
    });

    async function loadRevenue() {
        const year = document.getElementById('yearFilter').value;
        if (!year) return;
        try {
            // Cần lấy tất cả order rồi filter theo năm ở client do backend chưa có api thống kê theo năm cụ thể
            const orders = await apiRequest('/orders');
            let dataByMonth = Array.from({length: 12}, () => ({ count: 0, revenue: 0 }));

            orders.forEach(o => {
                if (o.status !== 'CANCELLED') {
                    const date = new Date(o.orderDate);
                    if (date.getFullYear() == year) {
                        const m = date.getMonth();
                        dataByMonth[m].count++;
                        dataByMonth[m].revenue += o.totalAmount || 0;
                    }
                }
            });

            // Render bảng
            const tbody = document.getElementById('revenueBody');
            tbody.innerHTML = '';
            let totalRev = 0, totalCount = 0;
            dataByMonth.forEach((d, i) => {
                totalCount += d.count;
                totalRev += d.revenue;
                tbody.innerHTML += `<tr>
                    <td>Tháng ${i+1}</td>
                    <td>${d.count}</td>
                    <td class="fw-bold text-success">${formatCurrency(d.revenue)}</td>
                </tr>`;
            });
            tbody.innerHTML += `<tr class="bg-light fw-bold text-primary">
                <td>TỔNG CỘNG</td>
                <td>${totalCount}</td>
                <td>${formatCurrency(totalRev)}</td>
            </tr>`;

            // Vẽ biểu đồ
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(document.getElementById('revenueChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'],
                    datasets: [{
                        label: 'Doanh Thu (đ)',
                        backgroundColor: '#3b71ca',
                        data: dataByMonth.map(d => d.revenue)
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        } catch (e) { Swal.fire('Lỗi', 'Không thể tải dữ liệu báo cáo', 'error'); }
    }
</script>
</body>
</html>
