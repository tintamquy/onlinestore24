<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>

<script>
    let currentChart = null;

    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        
        // Máº·c Ä‘á»‹nh xem 30 ngÃ y gáº§n nháº¥t
        const today = new Date();
        const past = new Date();
        past.setDate(today.getDate() - 30);
        
        document.getElementById('toDate').value = today.toISOString().split('T')[0];
        document.getElementById('fromDate').value = past.toISOString().split('T')[0];
        
        loadRevenue();
    });

    async function loadRevenue() {
        const fromDate = document.getElementById('fromDate').value;
        const toDate = document.getElementById('toDate').value;
        if (!fromDate || !toDate) return Swal.fire('Cáº£nh bÃ¡o', 'Vui lÃ²ng chá»n Tá»« ngÃ y vÃ  Äáº¿n ngÃ y', 'warning');

        try {
            const res = await apiRequest(`/reports/revenue?fromDate=${fromDate}&toDate=${toDate}`);
            
            const labels = res.labels || [];
            const data = res.data || [];

            // Render báº£ng
            const tbody = document.getElementById('revenueBody');
            tbody.innerHTML = '';
            let totalRev = 0;
            for(let i=0; i<labels.length; i++) {
                totalRev += data[i];
                tbody.innerHTML += `<tr>
                    <td>${labels[i]}</td>
                    <td class="fw-bold text-success">${formatCurrency(data[i])}</td>
                </tr>`;
            }
            if(labels.length > 0) {
                tbody.innerHTML += `<tr class="bg-light fw-bold text-primary">
                    <td>Tá»”NG Cá»˜NG</td>
                    <td>${formatCurrency(totalRev)}</td>
                </tr>`;
            } else {
                tbody.innerHTML = '<tr><td colspan="2">KhÃ´ng cÃ³ dá»¯ liá»‡u trong thá»i gian nÃ y</td></tr>';
            }

            // Váº½ biá»ƒu Ä‘á»“
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(document.getElementById('revenueChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Doanh Thu (Ä‘)',
                        backgroundColor: '#3b71ca',
                        data: data
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        } catch (e) { Swal.fire('Lá»—i', 'KhÃ´ng thá»ƒ táº£i dá»¯ liá»‡u bÃ¡o cÃ¡o', 'error'); }
    }

    function exportExcel() {
        const table = document.getElementById('revenueTable');
        const wb = XLSX.utils.table_to_book(table, {sheet: "Doanh Thu"});
        XLSX.writeFile(wb, `BaoCao_DoanhThu_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
</script>
