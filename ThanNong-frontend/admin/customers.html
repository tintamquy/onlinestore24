<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Khách Hàng — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link text-muted"><i class="fas fa-store me-1"></i>Xem cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</a></li>
        </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="dashboard.html" class="brand-link">
            <img src="../assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle elevation-3" onerror="this.style.display='none'">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="customers.html" class="nav-link active"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="report-revenue.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><p>Báo cáo doanh thu</p></a></li>
                    <li class="nav-item"><a href="report-customer.html" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>Khách hàng VIP</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <h1 class="m-0">Quản Lý Khách Hàng</h1>
                <button class="btn btn-primary" onclick="showCustomerModal()"><i class="fas fa-plus"></i> Thêm Khách Hàng</button>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table id="customersTable" class="table table-bordered table-striped table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Họ Tên</th>
                                        <th>Số điện thoại</th>
                                        <th>Thành phố</th>
                                        <th>Địa chỉ</th>
                                        <th>Hạn mức tín dụng</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="customersBody">
                                    <tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<!-- Modal Thêm/Sửa Khách Hàng -->
<div class="modal fade" id="customerFormModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="formModalTitle">Thêm Khách Hàng</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="customerId">
                <div class="row">
                    <div class="col-md-6 form-group">
                        <label>Họ (First Name)</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6 form-group">
                        <label>Tên (Last Name)</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="text" class="form-control" id="phoneNumber" required>
                </div>
                <div class="form-group">
                    <label>Thành phố</label>
                    <input type="text" class="form-control" id="city">
                </div>
                <div class="form-group">
                    <label>Địa chỉ</label>
                    <input type="text" class="form-control" id="address">
                </div>
                <div class="form-group">
                    <label>Hạn mức tín dụng</label>
                    <input type="number" class="form-control" id="creditLimit" value="0">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btnSaveCustomer" onclick="saveCustomer()">Lưu</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Lịch sử Đơn hàng -->
<div class="modal fade" id="customerOrdersModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title" id="customerModalTitle">Lịch sử đơn hàng</h5>
                <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <div class="modal-body">
                <div id="customerOrdersBody">
                    <div class="text-center py-4"><div class="spinner-border text-info"></div></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    let dtTable;
    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        loadCustomers();
    });

    async function loadCustomers() {
        try {
            const res = await apiRequest('/customers?page=0&size=1000');
            const tbody = document.getElementById('customersBody');
            if(dtTable) dtTable.destroy();
            tbody.innerHTML = res.data.map(c => `
                <tr>
                    <td class="text-center text-muted">${c.id}</td>
                    <td class="fw-bold text-primary">${c.firstName||''} ${c.lastName||''}</td>
                    <td>${c.phoneNumber||'---'}</td>
                    <td>${c.city||'---'}</td>
                    <td class="small">${c.addressLine1||c.address||'---'}</td>
                    <td class="text-right">${formatCurrency(c.creditLimit||0)}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info" onclick="editCustomer(${c.id}, '${c.firstName||''}', '${c.lastName||''}', '${c.phoneNumber||''}', '${c.city||''}', '${c.addressLine1||c.address||''}', ${c.creditLimit||0})" title="Sửa"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-success" onclick="viewCustomer(${c.id}, '${c.firstName||''} ${c.lastName||''}')" title="Xem lịch sử"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})" title="Xóa"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
            dtTable = $('#customersTable').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json' }
            });
        } catch (e) { Swal.fire('Lỗi', 'Không thể tải danh sách khách hàng', 'error'); }
    }

    async function deleteCustomer(id) {
        if (!confirm('Bạn có chắc muốn xóa khách hàng này?')) return;
        try {
            await apiRequest(`/customers/${id}`, 'DELETE');
            Swal.fire('Thành công', 'Đã xóa khách hàng', 'success');
            loadCustomers();
        } catch (e) {
            Swal.fire('Lỗi', e.message || 'Không thể xóa khách hàng', 'error');
        }
    }

    function showCustomerModal() {
        document.getElementById('customerId').value = '';
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('phoneNumber').value = '';
        document.getElementById('city').value = '';
        document.getElementById('address').value = '';
        document.getElementById('creditLimit').value = '0';
        document.getElementById('formModalTitle').textContent = 'Thêm Khách Hàng';
        $('#customerFormModal').modal('show');
    }

    function editCustomer(id, firstName, lastName, phone, city, address, creditLimit) {
        document.getElementById('customerId').value = id;
        document.getElementById('firstName').value = firstName;
        document.getElementById('lastName').value = lastName;
        document.getElementById('phoneNumber').value = phone;
        document.getElementById('city').value = city;
        document.getElementById('address').value = address;
        document.getElementById('creditLimit').value = creditLimit;
        document.getElementById('formModalTitle').textContent = 'Sửa Khách Hàng';
        $('#customerFormModal').modal('show');
    }

    async function saveCustomer() {
        const id = document.getElementById('customerId').value;
        const data = {
            firstName: document.getElementById('firstName').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            phoneNumber: document.getElementById('phoneNumber').value.trim(),
            city: document.getElementById('city').value.trim(),
            addressLine1: document.getElementById('address').value.trim(),
            creditLimit: parseFloat(document.getElementById('creditLimit').value) || 0
        };

        if (!data.firstName || !data.lastName || !data.phoneNumber) {
            Swal.fire('Cảnh báo', 'Vui lòng nhập đủ Họ, Tên và SĐT', 'warning');
            return;
        }

        const btn = document.getElementById('btnSaveCustomer');
        btn.disabled = true; btn.textContent = 'Đang lưu...';

        try {
            if (id) await apiRequest(`/customers/${id}`, 'PUT', data);
            else await apiRequest('/customers', 'POST', data);
            
            Swal.fire('Thành công', 'Đã lưu thông tin khách hàng!', 'success');
            $('#customerFormModal').modal('hide');
            loadCustomers();
        } catch (e) {
            Swal.fire('Lỗi', e.message || 'Không thể lưu khách hàng', 'error');
        } finally {
            btn.disabled = false; btn.textContent = 'Lưu';
        }
    }

    async function viewCustomer(id, name) {
        document.getElementById('customerModalTitle').textContent = `Lịch sử đơn hàng: ${name}`;
        document.getElementById('customerOrdersBody').innerHTML = '<div class="text-center py-4"><div class="spinner-border text-info"></div></div>';
        $('#customerOrdersModal').modal('show');
        
        try {
            const orders = await apiRequest(`/orders/customer/${id}`);
            if(!orders || orders.length === 0) {
                document.getElementById('customerOrdersBody').innerHTML = '<div class="alert alert-info">Khách hàng chưa có đơn hàng nào.</div>';
                return;
            }
            let html = `
                <table class="table table-bordered table-striped small">
                    <thead class="table-light">
                        <tr>
                            <th>ID Đơn</th>
                            <th>Ngày đặt</th>
                            <th>Trạng thái</th>
                            <th>Ghi chú</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(o => `
                            <tr>
                                <td>#${o.id}</td>
                                <td>${new Date(o.orderDate).toLocaleString('vi-VN')}</td>
                                <td><span class="badge ${o.status==='DONE'?'badge-success':o.status==='CANCELLED'?'badge-danger':'badge-warning'}">${o.status||'PENDING'}</span></td>
                                <td>${o.comments||''}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('customerOrdersBody').innerHTML = html;
        } catch (e) {
            document.getElementById('customerOrdersBody').innerHTML = '<div class="alert alert-danger">Lỗi khi tải dữ liệu</div>';
        }
    }
</script>
</body>
</html>
