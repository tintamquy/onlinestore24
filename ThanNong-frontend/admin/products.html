<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <style>
        .table-avatar { width:40px; height:40px; border-radius:8px; object-fit:contain; background:#f8f9fa; border:1px solid #dee2e6; }
    </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link text-muted"><i class="fas fa-store me-1"></i>Xem cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</a></li>
        </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="dashboard.html" class="brand-link">
            <img src="../assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle elevation-3" onerror="this.style.display='none'">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link active"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="customers.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="reviews.html" class="nav-link"><i class="nav-icon fas fa-star"></i><p>Đánh giá</p></a></li>
                    <li class="nav-item"><a href="report-revenue.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><p>Báo cáo doanh thu</p></a></li>
                    <li class="nav-item"><a href="report-customer.html" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>Khách hàng VIP</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2 align-items-center">
                    <div class="col-sm-6"><h1 class="m-0">Quản Lý Sản Phẩm</h1></div>
                    <div class="col-sm-6 text-right">
                        <button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus me-1"></i>Thêm sản phẩm mới</button>
                    </div>
                </div>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table id="productsTable" class="table table-bordered table-striped table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Ảnh</th>
                                        <th>Tên sản phẩm</th>
                                        <th>Mã SP</th>
                                        <th>Giá bán</th>
                                        <th>Tồn kho</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="productsBody">
                                    <tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<!-- Modal Thêm/Sửa Sản Phẩm -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="productModalTitle">Thêm Sản Phẩm Mới</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Mã sản phẩm <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="productCode" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Danh mục <span class="text-danger">*</span></label>
                            <select class="form-control" id="productLineId" required></select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Nhà cung cấp <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="productVendor" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label small fw-bold">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="buyPrice" required min="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label small fw-bold">Tồn kho <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="quantityInStock" required min="0">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label small fw-bold">Quy cách đóng gói</label>
                            <input type="text" class="form-control" id="productScale" placeholder="VD: 500ml">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold">Mô tả sản phẩm</label>
                            <textarea class="form-control" id="productDescription" rows="4"></textarea>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold">Ảnh sản phẩm</label>
                            <div class="input-group">
                                <input type="file" class="form-control" id="imageFile" accept="image/*">
                            </div>
                            <div id="imagePreview" class="mt-2 d-none">
                                <img src="" style="height:100px;border-radius:8px;border:1px solid #ddd;">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-primary" id="btnSaveProduct" onclick="saveProduct()">Lưu thông tin</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    let dtTable;
    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        loadCategories();
        loadProducts();
    });

    async function loadCategories() {
        try {
            const list = await apiRequest('/product-lines', 'GET');
            const sel = document.getElementById('productLineId');
            sel.innerHTML = '<option value="">Chọn danh mục...</option>' +
                list.map(c => `<option value="${c.id}">${c.productLine}</option>`).join('');
        } catch (e) { console.error('Lỗi load danh mục:', e); }
    }

    async function loadProducts() {
        try {
            const res = await apiRequest('/products?page=0&size=1000');
            const tbody = document.getElementById('productsBody');
            if(dtTable) { dtTable.destroy(); }
            tbody.innerHTML = res.data.map(p => `
                <tr>
                    <td class="text-center">${p.id}</td>
                    <td class="text-center">
                        <img src="${getProductImageUrl(p.imageUrl)}" alt="${p.productName}" class="table-avatar" onerror="this.src='../assets/images/products/placeholder.jpg'">
                    </td>
                    <td class="fw-bold text-primary">${p.productName}</td>
                    <td>${p.productCode}</td>
                    <td class="text-success fw-bold">${formatCurrency(p.buyPrice)}</td>
                    <td class="text-center"><span class="badge ${p.quantityInStock > 10 ? 'bg-success' : 'bg-danger'}">${p.quantityInStock}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`).join('');
            dtTable = $('#productsTable').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json' },
                order: [[0, 'desc']]
            });
        } catch (e) {
            Swal.fire('Lỗi','Không thể tải danh sách sản phẩm','error');
        }
    }

    function openProductModal() {
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        document.getElementById('productModalTitle').textContent = 'Thêm Sản Phẩm Mới';
        document.getElementById('imagePreview').classList.add('d-none');
        $('#productModal').modal('show');
    }

    async function editProduct(id) {
        try {
            const p = await apiRequest(`/products/${id}`);
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.productName;
            document.getElementById('productCode').value = p.productCode;
            document.getElementById('productLineId').value = p.productLineId;
            document.getElementById('productVendor').value = p.productVendor;
            document.getElementById('buyPrice').value = p.buyPrice;
            document.getElementById('quantityInStock').value = p.quantityInStock;
            document.getElementById('productScale').value = p.productScale || '';
            document.getElementById('productDescription').value = p.productDescription || '';
            document.getElementById('productModalTitle').textContent = 'Sửa Sản Phẩm: ' + p.productName;

            const preview = document.getElementById('imagePreview');
            if (p.imageUrl) {
                preview.classList.remove('d-none');
                preview.querySelector('img').src = getProductImageUrl(p.imageUrl);
            } else { preview.classList.add('d-none'); }

            $('#productModal').modal('show');
        } catch (e) { Swal.fire('Lỗi','Không thể lấy thông tin sản phẩm','error'); }
    }

    async function saveProduct() {
        const id = document.getElementById('productId').value;
        const data = {
            productName: document.getElementById('productName').value.trim(),
            productCode: document.getElementById('productCode').value.trim(),
            productLineId: document.getElementById('productLineId').value,
            productVendor: document.getElementById('productVendor').value.trim(),
            buyPrice: document.getElementById('buyPrice').value,
            quantityInStock: document.getElementById('quantityInStock').value,
            productScale: document.getElementById('productScale').value.trim(),
            productDescription: document.getElementById('productDescription').value.trim()
        };
        if(!data.productName || !data.productCode || !data.productLineId || !data.buyPrice || !data.quantityInStock) {
            Swal.fire('Cảnh báo','Vui lòng điền đủ trường bắt buộc','warning'); return;
        }

        const btn = document.getElementById('btnSaveProduct');
        btn.disabled = true; btn.textContent = 'Đang lưu...';
        try {
            let savedProduct;
            if (id) savedProduct = await apiRequest(`/products/${id}`, 'PUT', data);
            else savedProduct = await apiRequest('/products', 'POST', data);

            // Xử lý upload ảnh nếu có file mới
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                const token = localStorage.getItem('thanNong_token');
                const uploadRes = await fetch(`${BASE_URL}/products/upload-image`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (!uploadRes.ok) throw new Error('Lỗi upload ảnh');
                
                const uploadData = await uploadRes.json();
                // Cập nhật lại sản phẩm với link ảnh mới
                await apiRequest(`/products/${savedProduct.id}`, 'PUT', { ...data, imageUrl: uploadData.imageUrl });
            }

            $('#productModal').modal('hide');
            Swal.fire('Thành công','Đã lưu sản phẩm','success');
            loadProducts();
        } catch (e) {
            Swal.fire('Lỗi', e.message || 'Có lỗi xảy ra','error');
        } finally {
            btn.disabled = false; btn.textContent = 'Lưu thông tin';
        }
    }

    function deleteProduct(id) {
        Swal.fire({
            title:'Xóa sản phẩm?', text:'Hành động này không thể hoàn tác!', icon:'warning',
            showCancelButton:true, confirmButtonColor:'#d33', cancelButtonColor:'#3085d6', confirmButtonText:'Vâng, Xóa!'
        }).then(async (result) => {
            if(result.isConfirmed) {
                try {
                    await apiRequest(`/products/${id}`, 'DELETE');
                    Swal.fire('Đã xóa','Sản phẩm đã bị xóa.','success');
                    loadProducts();
                } catch(e) { Swal.fire('Lỗi',e.message,'error'); }
            }
        });
    }
</script>
</body>
</html>
