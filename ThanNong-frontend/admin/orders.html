<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link text-muted"><i class="fas fa-store me-1"></i>Xem cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</a></li>
        </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="dashboard.html" class="brand-link">
            <img src="../assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle elevation-3" onerror="this.style.display='none'">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="customers.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link active"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="report-revenue.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><p>Báo cáo doanh thu</p></a></li>
                    <li class="nav-item"><a href="report-customer.html" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>Khách hàng VIP</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <h1 class="m-0">Quản Lý Đơn Hàng</h1>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table id="ordersTable" class="table table-bordered table-striped table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Khách hàng</th>
                                        <th>SĐT</th>
                                        <th>Ngày đặt</th>
                                        <th>Tổng tiền</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersBody">
                                    <tr><td colspan="7" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<!-- Modal Chi Tiết Đơn Hàng -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Chi Tiết Đơn Hàng #<span id="detailOrderId"></span></h5>
                <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="orderDetailBody"></div>
            <div class="modal-footer">
                <select id="statusSelect" class="form-control d-inline-block w-auto">
                    <option value="PENDING">Chờ xác nhận</option>
                    <option value="CONFIRMED">Đã xác nhận</option>
                    <option value="SHIPPED">Đang giao hàng</option>
                    <option value="DONE">Hoàn thành</option>
                    <option value="CANCELLED">Hủy bỏ</option>
                </select>
                <button type="button" class="btn btn-success" onclick="updateOrderStatus()">Cập nhật trạng thái</button>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    let dtTable;
    let currentOrderId;
    const statusLabel = { PENDING:'Chờ XN', CONFIRMED:'Đã XN', SHIPPED:'Đang giao', DONE:'Hoàn thành', CANCELLED:'Đã hủy' };
    const statusColor = { PENDING:'warning', CONFIRMED:'info', SHIPPED:'primary', DONE:'success', CANCELLED:'danger' };

    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        loadOrders();
    });

    async function loadOrders() {
        try {
            const list = await apiRequest('/orders');
            const tbody = document.getElementById('ordersBody');
            if(dtTable) dtTable.destroy();
            tbody.innerHTML = list.map(o => `
                <tr>
                    <td class="text-center fw-bold text-muted">${o.id}</td>
                    <td>${o.customerFirstName || ''} ${o.customerLastName || ''}</td>
                    <td>${o.customerPhone || ''}</td>
                    <td>${formatDate(o.orderDate)}</td>
                    <td class="fw-bold text-success">${formatCurrency(o.totalAmount)}</td>
                    <td class="text-center"><span class="badge bg-${statusColor[o.status]||'secondary'}">${statusLabel[o.status]||o.status}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info" onclick="viewOrder(${o.id})"><i class="fas fa-eye"></i> Xem / Xử lý</button>
                    </td>
                </tr>`).join('');
            dtTable = $('#ordersTable').DataTable({
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/vi.json' },
                order: [[0, 'desc']]
            });
        } catch (e) { Swal.fire('Lỗi', 'Không thể tải danh sách đơn hàng', 'error'); }
    }

    async function viewOrder(id) {
        currentOrderId = id;
        try {
            const o = await apiRequest(`/orders/${id}`);
            document.getElementById('detailOrderId').textContent = o.id;
            document.getElementById('statusSelect').value = o.status;

            let html = `
                <div class="row mb-3">
                    <div class="col-sm-6">
                        <h6 class="fw-bold">Thông tin khách hàng:</h6>
                        <div>Họ tên: ${o.customerFirstName||''} ${o.customerLastName||''}</div>
                        <div>SĐT: ${o.customerPhone||''}</div>
                        <div>Địa chỉ: ${o.customerAddress||''}, ${o.customerCity||''}, ${o.customerState||''}</div>
                        <div>Ghi chú: <em>${o.comments||'Không có'}</em></div>
                    </div>
                    <div class="col-sm-6 text-sm-right">
                        <h6 class="fw-bold">Thông tin đơn:</h6>
                        <div>Ngày đặt: ${formatDate(o.orderDate)}</div>
                        <div>Tổng tiền: <span class="fw-bold text-success fs-5">${formatCurrency(o.totalAmount)}</span></div>
                    </div>
                </div>
                <h6 class="fw-bold">Sản phẩm:</h6>
                <table class="table table-sm table-bordered">
                    <thead class="bg-light"><tr><th>Sản phẩm</th><th class="text-center">Số lượng</th><th class="text-right">Đơn giá</th><th class="text-right">Thành tiền</th></tr></thead>
                    <tbody>
                        ${o.orderDetails ? o.orderDetails.map(d => `
                            <tr>
                                <td>${d.productName}</td>
                                <td class="text-center">${d.quantityOrder}</td>
                                <td class="text-right">${formatCurrency(d.priceEach)}</td>
                                <td class="text-right fw-bold">${formatCurrency(d.subTotal || d.priceEach * d.quantityOrder)}</td>
                            </tr>`).join('') : '<tr><td colspan="4" class="text-center">Lỗi dữ liệu chi tiết</td></tr>'}
                    </tbody>
                </table>
            `;
            document.getElementById('orderDetailBody').innerHTML = html;
            $('#orderModal').modal('show');
        } catch (e) { Swal.fire('Lỗi', 'Không thể tải chi tiết đơn hàng', 'error'); }
    }

    async function updateOrderStatus() {
        const newStatus = document.getElementById('statusSelect').value;
        try {
            await apiRequest(`/orders/${currentOrderId}/status`, 'PUT', { status: newStatus });
            $('#orderModal').modal('hide');
            Swal.fire('Thành công', 'Đã cập nhật trạng thái đơn hàng', 'success');
            loadOrders();
        } catch (e) { Swal.fire('Lỗi', e.message || 'Cập nhật thất bại', 'error'); }
    }
</script>
</body>
</html>
