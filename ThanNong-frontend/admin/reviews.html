<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đánh Giá — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li></ul>
        <ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt"></i></a></li></ul>
    </nav>
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/admin/dashboard.html" class="brand-link">
            <img src="/assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
                    <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="/admin/products.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="/admin/customers.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="/admin/orders.html" class="nav-link"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="/admin/report-revenue.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><p>Doanh thu</p></a></li>
                    <li class="nav-item"><a href="/admin/report-customer.html" class="nav-link"><i class="nav-icon fas fa-chart-bar"></i><p>Khách VIP</p></a></li>
                    <li class="nav-item"><a href="/admin/reviews.html" class="nav-link active"><i class="nav-icon fas fa-star"></i><p>Đánh giá</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header"><div class="container-fluid"><h1>Quản Lý Đánh Giá</h1></div></div>
        <section class="content">
            <div class="container-fluid">
                <div class="card">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table admin-table mb-0">
                                <thead>
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th>Khách hàng</th>
                                        <th>Rating</th>
                                        <th>Nội dung</th>
                                        <th>Ngày</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="reviewTableBody">
                                    <tr><td colspan="6" class="text-center py-4">Đang tải...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '/login.html'; return; }
        loadReviews();
    });

    async function loadReviews() {
        try {
            const reviews = await apiRequest('/reviews');
            const tbody = document.getElementById('reviewTableBody');
            
            if (!reviews || reviews.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">Chưa có đánh giá nào.</td></tr>`;
                return;
            }

            tbody.innerHTML = reviews.map((r, index) => {
                let stars = '';
                for (let i = 0; i < 5; i++) {
                    stars += i < r.rating ? '<i class="fas fa-star text-warning"></i>' : '<i class="far fa-star text-warning"></i>';
                }
                
                return `
                <tr>
                    <td class="text-center text-muted">${index + 1}</td>
                    <td><strong>${r.productName || 'Sản phẩm ' + r.productId}</strong></td>
                    <td>${r.customerName || 'KH ' + r.customerId}</td>
                    <td>${stars}</td>
                    <td><div style="max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${r.comment}">${r.comment}</div></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-danger" onclick="deleteReview(${r.id})"><i class="fas fa-trash"></i> Xóa</button>
                    </td>
                </tr>`;
            }).join('');
        } catch (err) {
            console.error(err);
            Swal.fire('Lỗi', 'Không thể tải danh sách đánh giá', 'error');
        }
    }

    async function deleteReview(id) {
        if (!confirm('Bạn có chắc muốn xóa đánh giá này?')) return;
        try {
            await apiRequest(`/reviews/${id}`, 'DELETE');
            Swal.fire('Thành công', 'Đã xóa đánh giá', 'success');
            loadReviews();
        } catch (e) {
            Swal.fire('Lỗi', e.message || 'Xóa thất bại', 'error');
        }
    }
</script>
</body>
</html>
