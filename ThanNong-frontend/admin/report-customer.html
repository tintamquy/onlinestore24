<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khách Hàng VIP — Thần Nông Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a href="../index.html" class="nav-link text-muted"><i class="fas fa-store me-1"></i>Xem cửa hàng</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logoutAndRedirect()"><i class="fas fa-sign-out-alt me-1"></i>Đăng xuất</a></li>
        </ul>
    </nav>

    <!-- Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="dashboard.html" class="brand-link">
            <img src="../assets/images/logo_shop.png" alt="Logo" class="brand-image img-circle elevation-3" onerror="this.style.display='none'">
            <span class="brand-text font-weight-light">Thần Nông Admin</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item"><a href="products.html" class="nav-link"><i class="nav-icon fas fa-box"></i><p>Sản phẩm</p></a></li>
                    <li class="nav-item"><a href="customers.html" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Khách hàng</p></a></li>
                    <li class="nav-item"><a href="orders.html" class="nav-link"><i class="nav-icon fas fa-shopping-bag"></i><p>Đơn hàng</p></a></li>
                    <li class="nav-item"><a href="reviews.html" class="nav-link"><i class="nav-icon fas fa-star"></i><p>Đánh giá</p></a></li>
                    <li class="nav-item"><a href="report-revenue.html" class="nav-link"><i class="nav-icon fas fa-chart-line"></i><p>Báo cáo doanh thu</p></a></li>
                    <li class="nav-item"><a href="report-customer.html" class="nav-link active"><i class="nav-icon fas fa-chart-bar"></i><p>Khách hàng VIP</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <h1 class="m-0">Báo Cáo Khách Hàng VIP</h1>
                <button class="btn btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Xuất Excel</button>
            </div>
        </div>

        <section class="content">
            <div class="container-fluid">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-0">
                        <div class="row">
                            <div class="col-md-4">
                                <select id="groupBy" class="form-control" onchange="loadVIPReport()">
                                    <option value="amount">Phân loại theo Tổng chi tiêu</option>
                                    <option value="orderCount">Phân loại theo Tổng số đơn hàng</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <canvas id="vipChart" style="min-height: 300px; max-height: 400px; width: 100%;"></canvas>
                        <hr>
                        <div class="table-responsive mt-4">
                            <table class="table table-bordered table-striped table-hover align-middle" id="vipTable">
                                <thead class="table-light text-center" id="tableHeader">
                                    <tr>
                                        <th>ID</th>
                                        <th>Khách Hàng</th>
                                        <th>Số ĐT</th>
                                        <th>Tổng Chi Tiêu</th>
                                        <th>Hạng VIP</th>
                                    </tr>
                                </thead>
                                <tbody id="reportBody">
                                    <tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
    let currentChart = null;

    document.addEventListener('DOMContentLoaded', () => {
        if (!isLoggedIn() || !isAdmin()) { window.location.href = '../login.html'; return; }
        loadVIPReport();
    });

    async function loadVIPReport() {
        const groupBy = document.getElementById('groupBy').value;
        try {
            const data = await apiRequest(`/reports/customers?groupBy=${groupBy}`);
            
            const tbody = document.getElementById('reportBody');
            const thead = document.getElementById('tableHeader');
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Chưa có dữ liệu</td></tr>';
                if (currentChart) currentChart.destroy();
                return;
            }

            let labels = [];
            let chartData = [];

            if (groupBy === 'amount') {
                thead.innerHTML = `<tr><th>ID</th><th>Khách Hàng</th><th>Số ĐT</th><th>Tổng Chi Tiêu</th><th>Hạng VIP</th></tr>`;
                
                // Sort by totalAmount desc
                data.sort((a,b) => b.totalAmount - a.totalAmount);

                tbody.innerHTML = data.map((c) => {
                    labels.push(c.firstName);
                    chartData.push(c.totalAmount);
                    
                    let badgeClass = 'secondary';
                    if (c.tier === 'Bạch Kim') badgeClass = 'dark';
                    else if (c.tier === 'Vàng') badgeClass = 'warning';
                    else if (c.tier === 'Bạc') badgeClass = 'secondary';
                    else if (c.tier === 'VIP') badgeClass = 'info';

                    return `<tr>
                        <td class="text-center">${c.customerId}</td>
                        <td class="fw-bold">${c.lastName} ${c.firstName}</td>
                        <td class="text-center">${c.phoneNumber || ''}</td>
                        <td class="text-center fw-bold text-success">${formatCurrency(c.totalAmount)}</td>
                        <td class="text-center"><span class="badge bg-${badgeClass}">${c.tier}</span></td>
                    </tr>`;
                }).join('');
            } else {
                thead.innerHTML = `<tr><th>ID</th><th>Khách Hàng</th><th>Số ĐT</th><th>Tổng Số Đơn</th></tr>`;
                
                // Sort by orderCount desc
                data.sort((a,b) => b.orderCount - a.orderCount);

                tbody.innerHTML = data.map((c) => {
                    labels.push(c.firstName);
                    chartData.push(c.orderCount);
                    return `<tr>
                        <td class="text-center">${c.customerId}</td>
                        <td class="fw-bold">${c.lastName} ${c.firstName}</td>
                        <td class="text-center">${c.phoneNumber || ''}</td>
                        <td class="text-center fw-bold text-primary">${c.orderCount}</td>
                    </tr>`;
                }).join('');
            }

            // Limit chart to top 15
            labels = labels.slice(0, 15);
            chartData = chartData.slice(0, 15);

            if (currentChart) currentChart.destroy();
            currentChart = new Chart(document.getElementById('vipChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: groupBy === 'amount' ? 'Chi Tiêu (đ)' : 'Số Đơn',
                        backgroundColor: groupBy === 'amount' ? '#f4a021' : '#8b5e3c',
                        data: chartData
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

        } catch (e) { Swal.fire('Lỗi', 'Không thể tải báo cáo', 'error'); }
    }

    function exportExcel() {
        const table = document.getElementById('vipTable');
        const wb = XLSX.utils.table_to_book(table, {sheet: "Khach Hang VIP"});
        XLSX.writeFile(wb, `BaoCao_KhachHangVIP_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
</script>
</body>
</html>
