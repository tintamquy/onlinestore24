# ===== Cấu hình kết nối MySQL =====
spring.datasource.url=jdbc:mysql://localhost:3306/thannong_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update: tự động cập nhật schema theo entity (môi trường dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== Khởi tạo dữ liệu mẫu =====
spring.sql.init.mode=always
spring.datasource.initialization-mode=always
spring.jpa.defer-datasource-initialization=true
spring.datasource.sql-script-encoding=UTF-8

# ===== Server =====
server.port=8080

# ===== Cấu hình upload file ảnh sản phẩm =====
# Thư mục lưu ảnh (tạo tự động nếu chưa có)
app.upload.dir=uploads/products
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ===== Cấu hình JWT =====
# Secret key để ký JWT (thay bằng chuỗi ngẫu nhiên khi lên production)
app.jwt.secret=ThanNong2024SecretKeyForJwtTokenGeneration

# ===== Tắt Spring Security mặc định password log =====
spring.security.user.name=admin
spring.security.user.password=admin123

# ===== Logging =====
logging.level.com.thannong=DEBUG
